<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FROXY Market Simulator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="screen">
  <h1>FROXY LOGIN</h1>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- LOADING -->
<div id="loadingScreen" class="screen hidden">
  <h1>Loading Market...</h1>
</div>

<!-- DASHBOARD -->
<div id="app" class="hidden">
<div class="news">
  <h3>Market News</h3>
  <p id="newsBox">Loading news...</p>
</div>
  
  <div class="topbar">
    <h2>FROXY Market Simulator</h2>
    <div>Balance: ₱<span id="balance">1000</span></div>
  </div>

  <div class="market">

    <div class="card">
      <h3>Bitcoin (BTC)</h3>
      <p id="btcPrice">Loading...</p>
      <button onclick="buy('BTC')">Buy</button>
      <button onclick="sell('BTC')">Sell</button>
    </div>

    <div class="card">
      <h3>Apple (AAPL)</h3>
      <p id="aaplPrice">Loading...</p>
      <button onclick="buy('AAPL')">Buy</button>
      <button onclick="sell('AAPL')">Sell</button>
    </div>

    <div class="card">
      <h3>Tesla (TSLA)</h3>
      <p id="tslaPrice">Loading...</p>
      <button onclick="buy('TSLA')">Buy</button>
      <button onclick="sell('TSLA')">Sell</button>
    </div>

  </div>

  <div class="portfolio">
    <h3>Your Portfolio</h3>
    <pre id="portfolio"></pre>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
